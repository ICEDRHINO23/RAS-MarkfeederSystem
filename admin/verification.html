<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Result Verification | RAS Markfeeder ERP</title>

    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/verification.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Main Content -->

    <main class="main-content">

        <!-- Header -->

        <div class="page-header">

            <div>

                <h1>Result Verification</h1>

                <p>
                    Verify submitted marks before publishing results
                </p>

            </div>

            <div class="header-actions">

                <button
                    id="refreshBtn"
                    class="btn-secondary">

                    Refresh

                </button>

                <button
                    id="processBtn"
                    class="btn-primary">

                    Process Results

                </button>

            </div>

        </div>

        <!-- Dashboard Cards -->

        <section class="dashboard-grid">

            <div class="card">

                <h3>Total Subjects</h3>

                <h1 id="totalSubjects">0</h1>

            </div>

            <div class="card">

                <h3>Submitted</h3>

                <h1 id="submittedSubjects">0</h1>

            </div>

            <div class="card">

                <h3>Verified</h3>

                <h1 id="verifiedSubjects">0</h1>

            </div>

            <div class="card">

                <h3>Pending</h3>

                <h1 id="pendingSubjects">0</h1>

            </div>

        </section>

        <!-- Filter Card -->

        <section class="filter-card">

            <h2>Verification Filters</h2>

            <div class="filter-grid">

                <div class="form-group">

                    <label>Academic Year</label>

                    <select id="academicYear"></select>

                </div>

                <div class="form-group">

                    <label>Exam</label>

                    <select id="examSelect"></select>

                </div>

                <div class="form-group">

                    <label>Class</label>

                    <select id="classSelect"></select>

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <select id="statusSelect">

                        <option value="All">All</option>
                        <option value="Draft">Draft</option>
                        <option value="Submitted">Submitted</option>
                        <option value="Verified">Verified</option>
                        <option value="Published">Published</option>

                    </select>

                </div>

            </div>

        </section>

        <!-- Verification Table -->

        <section class="table-card">

            <table class="verification-table">

                <thead>

                <tr>

                    <th>Teacher</th>

                    <th>Class</th>

                    <th>Subject</th>

                    <th>Exam</th>

                    <th>Students</th>

                    <th>Completion</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="verificationTable">

                    <tr>

                        <td colspan="8">

                            Loading...

                        </td>

                    </tr>

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- Review Modal -->

<div
    id="reviewModal"
    class="modal">

    <div class="modal-content large">

        <div class="modal-header">

            <h2>

                Review Submitted Marks

            </h2>

            <button
                id="closeModal">

                ✕

            </button>

        </div>

        <div
            id="reviewContent">

        </div>

        <div class="modal-footer">

            <button
                id="rejectBtn"
                class="btn-danger">

                Reject

            </button>

            <button
                id="verifyBtn"
                class="btn-success">

                Verify

            </button>

        </div>

    </div>

</div>

<script type="module"
src="../js/verification.js"></script>

</body>

</html>
