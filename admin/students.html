<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Students | RAS MarkfeederSystem</title>

    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/students.css">

</head>

<body>

<div class="page-container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo-section">

            <img src="../assets/logos/logo.png" class="logo">

            <h2>RAS Markfeeder</h2>

            <p>School Examination ERP</p>

        </div>

        <nav>

            <a href="index.html">🏠 Dashboard</a>

            <a class="active" href="students.html">🎓 Students</a>

            <a href="teachers.html">👨‍🏫 Teachers</a>

            <a href="classes.html">🏫 Classes</a>

            <a href="subjects.html">📚 Subjects</a>

            <a href="exams.html">📝 Exams</a>

            <a href="../login.html">🚪 Logout</a>

        </nav>

    </aside>

    <!-- Main -->

    <main class="content">

        <div class="topbar">

            <div>

                <h1>Student Management</h1>

                <p>Manage all students</p>

            </div>

            <button id="addStudentBtn">

                + Add Student

            </button>

        </div>

        <!-- Statistics -->

        <div class="cards">

            <div class="card">

                <h3>Total Students</h3>

                <h1 id="totalStudents">0</h1>

            </div>

            <div class="card">

                <h3>Boys</h3>

                <h1 id="boysCount">0</h1>

            </div>

            <div class="card">

                <h3>Girls</h3>

                <h1 id="girlsCount">0</h1>

            </div>

            <div class="card">

                <h3>Active</h3>

                <h1 id="activeCount">0</h1>

            </div>

        </div>

        <!-- Filters -->

        <div class="toolbar">

            <input
                type="text"
                id="searchStudent"
                placeholder="Search student...">

            <select id="filterClass">

                <option value="">All Classes</option>

            </select>

            <select id="filterYear">

                <option value="">Academic Year</option>

            </select>

            <button id="exportExcel">

                Export Excel

            </button>

        </div>

        <!-- Table -->

        <div class="table-container">

            <table>

                <thead>

                <tr>

                    <th>Photo</th>
                    <th>Admission No</th>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Class</th>
                    <th>Year</th>
                    <th>Mobile</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </div>

    </main>

</div>

<script type="module" src="../js/students.js"></script>

</body>
</html>
