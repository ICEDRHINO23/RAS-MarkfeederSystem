<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exams | RAS Markfeeder ERP</title>

    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/exams.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <main class="main-content">

        <!-- ==========================
             PAGE HEADER
        =========================== -->

        <div class="page-header">

            <div>

                <h1>Exam Management</h1>

                <p>Create and Manage School Examinations</p>

            </div>

            <div class="header-actions">

                <input
                    type="text"
                    id="searchExam"
                    placeholder="Search Exam...">

                <button
                    class="btn-primary"
                    id="addExamBtn">

                    <i class="fa-solid fa-plus"></i>

                    Add Exam

                </button>

            </div>

        </div>

        <!-- ==========================
             DASHBOARD
        =========================== -->

        <div class="dashboard-grid">

            <div class="card">

                <h3>Total Exams</h3>

                <h1 id="totalExams">0</h1>

                <span>Available Exams</span>

            </div>

            <div class="card">

                <h3>Active Exams</h3>

                <h1 id="activeExams">0</h1>

                <span>Currently Running</span>

            </div>

            <div class="card">

                <h3>Locked Exams</h3>

                <h1 id="lockedExams">0</h1>

                <span>Marks Locked</span>

            </div>

            <div class="card">

                <h3>Completed</h3>

                <h1 id="completedExams">0</h1>

                <span>Finished Exams</span>

            </div>

        </div>

        <!-- ==========================
             TABLE
        =========================== -->

        <div class="table-card">

            <div class="table-toolbar">

                <select id="filterYear">

                    <option value="">

                        All Academic Years

                    </option>

                </select>

                <select id="filterStatus">

                    <option value="">

                        All Status

                    </option>

                    <option value="Draft">

                        Draft

                    </option>

                    <option value="Active">

                        Active

                    </option>

                    <option value="Completed">

                        Completed

                    </option>

                </select>

                <button id="exportExams">

                    <i class="fa-solid fa-file-excel"></i>

                    Export Excel

                </button>

            </div>

            <table>

                <thead>

                <tr>

                    <th>Exam</th>

                    <th>Academic Year</th>

                    <th>Class</th>

                    <th>Start</th>

                    <th>End</th>

                    <th>Status</th>

                    <th>Lock</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody id="examTable">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!-- ==========================
     EXAM MODAL
========================== -->

<div class="modal"
     id="examModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">

                Add Exam

            </h2>

            <button id="closeModal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <form id="examForm">

            <div class="form-grid">

                <input
                    id="exam_name"
                    type="text"
                    placeholder="Exam Name"
                    required>

                <input
                    id="display_order"
                    type="number"
                    placeholder="Display Order">

                <select
                    id="academic_year">

                </select>

                <select
                    id="class_id">

                </select>

                <input
                    id="start_date"
                    type="date">

                <input
                    id="end_date"
                    type="date">

                <select
                    id="status">

                    <option value="Draft">

                        Draft

                    </option>

                    <option value="Active">

                        Active

                    </option>

                    <option value="Completed">

                        Completed

                    </option>

                </select>

            </div>

            <div class="checkbox-group">

                <label>

                    <input
                        id="lock_marks"
                        type="checkbox">

                    Lock Marks Entry

                </label>

            </div>

            <div class="checkbox-group">

                <label>

                    <input
                        id="active"
                        type="checkbox"
                        checked>

                    Active Exam

                </label>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    id="cancelExam">

                    Cancel

                </button>

                <button
                    type="submit"
                    class="btn-primary">

                    Save Exam

                </button>

            </div>

        </form>

    </div>

</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script type="module"
        src="../js/exams.js"></script>

</body>

</html>
